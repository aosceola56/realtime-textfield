<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat Rooms</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script> 
</head>
<body>
    <canvas id="dot-canvas"></canvas>
    <div class="toast-container"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="bi bi-chat-dots-fill"></i> Rooms</h2>
                <button class="sidebar-toggle-close" id="sidebarCloseBtn" title="Close sidebar">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="room-create">
                <input type="text" id="newRoomInput" placeholder="New room name..." maxlength="30" />
                <button id="createRoomBtn" title="Create room"><i class="bi bi-plus-lg"></i></button>
            </div>
            <ul class="room-list" id="roomList"></ul>
            <div class="sidebar-footer">
                <div class="profile-section">
                    <div class="profile-avatar" id="profileAvatar"></div>
                    <div class="profile-info">
                        <span id="currentUsername" class="profile-name"></span>
                        <button class="profile-edit-btn" id="editUsernameBtn" title="Edit username"><i class="bi bi-pencil-fill"></i></button>
                    </div>
                </div>
                <div class="username-edit" id="usernameEditSection" style="display:none;">
                    <input type="text" id="usernameField" placeholder="Enter username..." />
                    <button id="updateUsernameButton"><i class="bi bi-check-lg"></i></button>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-header">
                <button class="sidebar-toggle" id="sidebarToggleBtn" title="Toggle sidebar">
                    <i class="bi bi-list"></i>
                </button>
                <div class="chat-header-info">
                    <h1 id="chatRoomTitle"><i class="bi bi-hash"></i> <span>Select a room</span></h1>
                    <span class="chat-user-count" id="chatUserCount"></span>
                </div>
                <div class="chat-header-actions">
                    <div id="darkModeSwitch">
                        <p class="switch-label">Dark Mode</p>
                        <label class="switch">
                            <input type="checkbox" onchange="toggleDarkMode(this)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="chat-empty-state" id="chatEmptyState">
                    <i class="bi bi-chat-square-text-fill"></i>
                    <h3>Welcome to Real-Time Chat</h3>
                    <p>Select a room from the sidebar to start chatting</p>
                </div>
                <ul id="textList"></ul>
            </div>

            <div class="chat-input-area" id="chatInputArea" style="display:none;">
                <div class="chat-input-wrapper">
                    <input type="text" id="textField" placeholder="Type a message..." />
                    <span id="charCounter">0/500</span>
                    <button id="submitButton" title="Send message"><i class="bi bi-send-fill"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Text Sharing with Profiles</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script> 
</head>
<body>
    <canvas id="dot-canvas"></canvas>
    <div class="toast-container"></div>
    <div class="container">
        <h1>Real-Time Messaging</h1>
        <div class="profile">
            <p id="usernameDisplay">You are: <span id="currentUsername"></span></p>
            <input type="text" id="usernameField" placeholder="Enter username here..." />
            <button id="updateUsernameButton">Update Username</button>
        </div>
        <input type="text" id="textField" placeholder="Enter text here..." />
        <button id="submitButton">Submit</button>
        <p id="charCounter">0/500</p>
        <h2>Submitted Text:</h2>
        <ul id="textList"></ul>
    </div>
    <div id="darkModeSwitch">
        <label class="switch">
            <input type="checkbox" onchange="toggleDarkMode(this)">
            <span class="slider"></span>
        </label>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
